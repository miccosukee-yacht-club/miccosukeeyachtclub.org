      <stop offset="0" stop-color="#dde7f1"></stop>
      <stop offset="0.7" stop-color="#f5edd9"></stop>
      <stop offset="1" stop-color="#ebdfc1"></stop>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a6fa5"></stop>
      <stop offset="1" stop-color="#0a2240"></stop>
