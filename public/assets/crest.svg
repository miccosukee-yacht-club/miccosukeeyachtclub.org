      <path d="M0,3 Q2.5,0 5,3 T10,3" fill="none" stroke="#b08a3e" stroke-width="1.4" stroke-linecap="round"></path>
    </pattern>
    <radialGradient id="brass" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8d6a1"></stop>
      <stop offset="55%" stop-color="#b08a3e"></stop>
      <stop offset="100%" stop-color="#8c6c2c"></stop>
    </radialGradient>
  </defs>

  
  <circle cx="120" cy="120" r="112" fill="none" stroke="url(#rope)" stroke-width="6"></circle>
  <circle cx="120" cy="120" r="106" fill="none" stroke="#8c6c2c" stroke-width="0.6" opacity="0.5"></circle>

  
  <circle cx="120" cy="120" r="98" fill="#0a2240"></circle>
